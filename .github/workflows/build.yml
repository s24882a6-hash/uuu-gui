name: Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev libqt6svg6-dev libusb-1.0-0-dev cmake build-essential git \
            libzstd-dev libtinyxml2-dev libbz2-dev zlib1g-dev libssl-dev \
            libgl-dev libfuse2 libglib2.0-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-render-util0 libxkbcommon-x11-0 \
            qt6-gtk-platformtheme

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build
          DESTDIR=AppDir cmake --install build

      - name: Build AppImage
        run: |
          sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 256 -h 256 icons/UUUFlashTool.svg -o UUUFlashTool.png

          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage appimagetool-x86_64.AppImage
          export QMAKE=$(which qmake6 || which qmake)
          export EXTRA_QT_PLUGINS=platformthemes/libqgtk3.so:styles/libqgtk3.so
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --executable AppDir/usr/bin/uuu-helper \
            --desktop-file UUUFlashTool.desktop \
            --icon-file UUUFlashTool.png
          for lib in libX11 libX11-xcb libxcb libxkbcommon libxkbcommon-x11 \
                     libxcb-icccm libxcb-image libxcb-keysyms1 libxcb-render-util libxcb-cursor \
                     libXext libXrender libOpenGL libEGL libGLdispatch; do
            find /usr/lib/x86_64-linux-gnu -name "${lib}.so*" -exec cp -Pn {} AppDir/usr/lib/ \; 2>/dev/null || true
          done
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir UUU_Flash_Tool-x86_64.AppImage

      - name: Package deb
        run: |
          sudo apt-get install -y alien
          VERSION=$(git describe --tags --always | sed 's/^v//')
          mkdir -p deb/DEBIAN \
                   deb/opt/uuu-gui/bin \
                   deb/opt/uuu-gui/lib \
                   deb/opt/uuu-gui/plugins \
                   deb/usr/local/bin \
                   deb/usr/share/applications \
                   deb/usr/share/icons/hicolor/256x256/apps
          cp AppDir/usr/bin/UUUFlashTool deb/opt/uuu-gui/bin/
          cp AppDir/usr/bin/uuu-helper    deb/opt/uuu-gui/bin/
          cp -r AppDir/usr/lib/.          deb/opt/uuu-gui/lib/
          [ -d AppDir/usr/plugins ] && cp -r AppDir/usr/plugins/. deb/opt/uuu-gui/plugins/
          cp UUUFlashTool.desktop deb/usr/share/applications/
          cp UUUFlashTool.png     deb/usr/share/icons/hicolor/256x256/apps/UUUFlashTool.png
          printf '#!/bin/sh\nexport LD_LIBRARY_PATH=/opt/uuu-gui/lib:$LD_LIBRARY_PATH\nexport QT_PLUGIN_PATH=/opt/uuu-gui/plugins\nexec /opt/uuu-gui/bin/UUUFlashTool "$@"\n' \
            > deb/usr/local/bin/UUUFlashTool
          chmod +x deb/usr/local/bin/UUUFlashTool
          cat > deb/DEBIAN/control << EOF
          Package: uuu-gui
          Version: $VERSION
          Architecture: amd64
          Maintainer: uuu-gui
          Depends: libusb-1.0-0, libgl1
          Description: NXP UUU firmware flashing GUI (self-contained)
          EOF
          dpkg-deb --build deb uuu-gui-amd64.deb
          sudo alien --to-rpm --scripts uuu-gui-amd64.deb

      - uses: actions/upload-artifact@v4
        with:
          name: uuu-gui-linux-appimage
          path: "*.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: uuu-gui-linux-deb
          path: "uuu-gui-amd64.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: uuu-gui-linux-rpm
          path: "*.rpm"

  build-linux-arm64:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev libqt6svg6-dev libusb-1.0-0-dev cmake build-essential git \
            libzstd-dev libtinyxml2-dev libbz2-dev zlib1g-dev libssl-dev \
            libgl-dev libfuse2 libglib2.0-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-render-util0 libxkbcommon-x11-0 \
            qt6-gtk-platformtheme librsvg2-bin alien

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build
          DESTDIR=AppDir cmake --install build

      - name: Build AppImage
        run: |
          rsvg-convert -w 256 -h 256 icons/UUUFlashTool.svg -o UUUFlashTool.png
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-aarch64.AppImage
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage
          chmod +x linuxdeploy-aarch64.AppImage linuxdeploy-plugin-qt-aarch64.AppImage appimagetool-aarch64.AppImage
          export QMAKE=$(which qmake6 || which qmake)
          export EXTRA_QT_PLUGINS=platformthemes/libqgtk3.so:styles/libqgtk3.so
          ./linuxdeploy-aarch64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --executable AppDir/usr/bin/uuu-helper \
            --desktop-file UUUFlashTool.desktop \
            --icon-file UUUFlashTool.png
          for lib in libX11 libX11-xcb libxcb libxkbcommon libxkbcommon-x11 \
                     libxcb-icccm libxcb-image libxcb-keysyms1 libxcb-render-util libxcb-cursor \
                     libXext libXrender libOpenGL libEGL libGLdispatch; do
            find /usr/lib/aarch64-linux-gnu -name "${lib}.so*" -exec cp -Pn {} AppDir/usr/lib/ \; 2>/dev/null || true
          done
          ARCH=aarch64 ./appimagetool-aarch64.AppImage AppDir UUU_Flash_Tool-aarch64.AppImage

      - name: Package deb
        run: |
          VERSION=$(git describe --tags --always | sed 's/^v//')
          mkdir -p deb/DEBIAN \
                   deb/opt/uuu-gui/bin \
                   deb/opt/uuu-gui/lib \
                   deb/opt/uuu-gui/plugins \
                   deb/usr/local/bin \
                   deb/usr/share/applications \
                   deb/usr/share/icons/hicolor/256x256/apps
          cp AppDir/usr/bin/UUUFlashTool deb/opt/uuu-gui/bin/
          cp AppDir/usr/bin/uuu-helper    deb/opt/uuu-gui/bin/
          cp -r AppDir/usr/lib/.          deb/opt/uuu-gui/lib/
          [ -d AppDir/usr/plugins ] && cp -r AppDir/usr/plugins/. deb/opt/uuu-gui/plugins/
          cp UUUFlashTool.desktop deb/usr/share/applications/
          cp UUUFlashTool.png     deb/usr/share/icons/hicolor/256x256/apps/UUUFlashTool.png
          printf '#!/bin/sh\nexport LD_LIBRARY_PATH=/opt/uuu-gui/lib:$LD_LIBRARY_PATH\nexport QT_PLUGIN_PATH=/opt/uuu-gui/plugins\nexec /opt/uuu-gui/bin/UUUFlashTool "$@"\n' \
            > deb/usr/local/bin/UUUFlashTool
          chmod +x deb/usr/local/bin/UUUFlashTool
          cat > deb/DEBIAN/control << EOF
          Package: uuu-gui
          Version: $VERSION
          Architecture: arm64
          Maintainer: uuu-gui
          Depends: libusb-1.0-0, libgl1
          Description: NXP UUU firmware flashing GUI (self-contained)
          EOF
          dpkg-deb --build deb uuu-gui-arm64.deb
          sudo alien --to-rpm --scripts uuu-gui-arm64.deb

      - uses: actions/upload-artifact@v4
        with:
          name: uuu-gui-linux-arm64-appimage
          path: "*.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: uuu-gui-linux-arm64-deb
          path: "uuu-gui-arm64.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: uuu-gui-linux-arm64-rpm
          path: "*.rpm"

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          arch: clang_64

      - name: Install dependencies
        run: brew install libusb zstd tinyxml2 bzip2 openssl@3 pkg-config librsvg

      - name: Generate macOS icon
        run: |
          # Use the safe-area variant (squircle + transparent margins) so the
          # Dock icon matches the macOS style.
          mkdir -p UUUFlashTool.iconset
          gen() { rsvg-convert -w "$1" -h "$1" icons/UUUFlashTool-macos.svg -o "UUUFlashTool.iconset/$2"; }
          gen 16  icon_16x16.png;    gen 32   icon_16x16@2x.png
          gen 32  icon_32x32.png;    gen 64   icon_32x32@2x.png
          gen 128 icon_128x128.png;  gen 256  icon_128x128@2x.png
          gen 256 icon_256x256.png;  gen 512  icon_256x256@2x.png
          gen 512 icon_512x512.png;  gen 1024 icon_512x512@2x.png
          iconutil -c icns UUUFlashTool.iconset -o icons/UUUFlashTool.icns

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$(brew --prefix libusb)"
          cmake --build build

      - name: Deploy
        run: |
          # -executable= makes macdeployqt also bundle/fix-up the uuu-helper's dylibs
          macdeployqt build/UUUFlashTool.app -executable=build/UUUFlashTool.app/Contents/MacOS/uuu-helper
          codesign --force --deep --sign - build/UUUFlashTool.app
          # codesign/Spotlight can hold file handles briefly; retry to avoid "Resource busy"
          for i in 1 2 3 4 5; do
            hdiutil create -volname uuu-gui -srcfolder build/UUUFlashTool.app -ov -format UDZO uuu-gui-macos.dmg && break
            sleep 5
          done

      - uses: actions/upload-artifact@v4
        with:
          name: uuu-gui-macos
          path: uuu-gui-macos.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          arch: win64_msvc2022_64

      - name: Install dependencies
        run: vcpkg install libusb zstd tinyxml2 bzip2 zlib openssl pkgconf --triplet x64-windows

      - name: Build
        run: |
          # libuuu's CMake uses pkg_check_modules, so point pkg-config at vcpkg's .pc files
          $env:PKG_CONFIG_PATH = "C:/vcpkg/installed/x64-windows/lib/pkgconfig"
          $env:PATH = "C:/vcpkg/installed/x64-windows/tools/pkgconf;$env:PATH"
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows
          cmake --build build --config Release

      - name: Deploy
        run: |
          windeployqt build/Release/UUUFlashTool.exe
          # Copy vcpkg runtime DLLs (zstd, tinyxml2, bzip2, zlib, openssl, libusb)
          Get-ChildItem "C:/vcpkg/installed/x64-windows/bin" -Filter "*.dll" |
            Copy-Item -Destination "build/Release/"

      - uses: actions/upload-artifact@v4
        with:
          name: uuu-gui-windows
          path: build/Release/
