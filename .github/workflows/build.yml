name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev libusb-1.0-0-dev cmake build-essential

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - uses: actions/upload-artifact@v4
        with:
          name: uuu-gui-linux
          path: build/uuuapp

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          arch: clang_64

      - name: Install libusb
        run: brew install libusb

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Deploy
        run: |
          macdeployqt build/uuuapp.app -dmg
          mv build/uuuapp.dmg uuu-gui-macos.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: uuu-gui-macos
          path: uuu-gui-macos.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          arch: win64_msvc2019_64

      - name: Install libusb
        run: vcpkg install libusb --triplet x64-windows

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          cmake --build build --config Release

      - name: Deploy
        run: windeployqt build/Release/uuuapp.exe

      - uses: actions/upload-artifact@v4
        with:
          name: uuu-gui-windows
          path: build/Release/
