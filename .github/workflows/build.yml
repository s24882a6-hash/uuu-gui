name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev libusb-1.0-0-dev cmake build-essential \
            libgl-dev libfuse2 libglib2.0-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-render-util0 libxkbcommon-x11-0 \
            qt6-gtk-platformtheme

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build
          DESTDIR=AppDir cmake --install build

      - name: Build AppImage
        run: |
          convert -size 256x256 xc:#1565C0 \
            -fill white -font DejaVu-Sans-Bold -pointsize 72 \
            -gravity center -annotate 0 "UUU" uuuapp.png

          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          export QMAKE=$(which qmake6 || which qmake)
          export EXTRA_QT_PLUGINS=platformthemes/libqgtk3.so:styles/libqgtk3.so
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --desktop-file uuuapp.desktop \
            --icon-file uuuapp.png \
            --output appimage

      - name: Package deb
        run: |
          sudo apt-get install -y alien
          mkdir -p deb/DEBIAN deb/usr/bin deb/usr/share/applications \
                   deb/usr/share/icons/hicolor/256x256/apps
          cp AppDir/usr/bin/uuuapp deb/usr/bin/
          cp uuuapp.desktop        deb/usr/share/applications/
          cp uuuapp.png            deb/usr/share/icons/hicolor/256x256/apps/uuuapp.png
          cat > deb/DEBIAN/control << 'EOF'
          Package: uuu-gui
          Version: 1.0.0
          Architecture: amd64
          Maintainer: uuu-gui
          Depends: libqt6widgets6, libusb-1.0-0
          Description: NXP UUU firmware flashing GUI
          EOF
          dpkg-deb --build deb uuu-gui-amd64.deb
          sudo alien --to-rpm --scripts uuu-gui-amd64.deb

      - uses: actions/upload-artifact@v4
        with:
          name: uuu-gui-linux-appimage
          path: "*.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: uuu-gui-linux-deb
          path: "uuu-gui-amd64.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: uuu-gui-linux-rpm
          path: "*.rpm"

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          arch: clang_64

      - name: Install libusb
        run: brew install libusb

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$(brew --prefix libusb)"
          cmake --build build

      - name: Deploy
        run: |
          macdeployqt build/uuuapp.app
          codesign --force --deep --sign - build/uuuapp.app
          hdiutil create -volname uuu-gui -srcfolder build/uuuapp.app -ov -format UDZO uuu-gui-macos.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: uuu-gui-macos
          path: uuu-gui-macos.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          arch: win64_msvc2022_64

      - name: Install libusb
        run: vcpkg install libusb --triplet x64-windows

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          cmake --build build --config Release

      - name: Deploy
        run: windeployqt build/Release/uuuapp.exe

      - uses: actions/upload-artifact@v4
        with:
          name: uuu-gui-windows
          path: build/Release/
