name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev libqt6svg6-dev libusb-1.0-0-dev cmake build-essential git \
            libzstd-dev libtinyxml2-dev libbz2-dev zlib1g-dev libssl-dev \
            libgl-dev libfuse2 libglib2.0-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-render-util0 libxkbcommon-x11-0 \
            qt6-gtk-platformtheme librsvg2-bin

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build
          DESTDIR=AppDir cmake --install build

      - name: Build AppImage
        run: |
          rsvg-convert -w 256 -h 256 icons/uuuapp.svg -o uuuapp.png
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          export QMAKE=$(which qmake6 || which qmake)
          export EXTRA_QT_PLUGINS=platformthemes/libqgtk3.so:styles/libqgtk3.so
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --executable AppDir/usr/bin/uuu-helper \
            --desktop-file uuuapp.desktop \
            --icon-file uuuapp.png \
            --output appimage
          mv UUU_Flash_Tool-x86_64.AppImage uuu-gui-linux.AppImage

      - name: Build .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p deb/DEBIAN deb/usr/bin deb/usr/share/applications \
                   deb/usr/share/icons/hicolor/256x256/apps
          cp AppDir/usr/bin/uuuapp     deb/usr/bin/
          cp AppDir/usr/bin/uuu-helper deb/usr/bin/
          cp uuuapp.desktop        deb/usr/share/applications/
          cp uuuapp.png            deb/usr/share/icons/hicolor/256x256/apps/uuuapp.png
          cat > deb/DEBIAN/control << EOF
          Package: uuu-gui
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: uuu-gui
          Depends: libqt6widgets6, libqt6svg6, libusb-1.0-0, libzstd1, libtinyxml2-9, libbz2-1.0, zlib1g, libssl3
          Description: NXP UUU firmware flashing GUI
          EOF
          dpkg-deb --build deb uuu-gui-linux.deb

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: uuu-gui-linux.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: uuu-gui-linux.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          arch: clang_64

      - name: Install dependencies
        run: brew install libusb zstd tinyxml2 bzip2 openssl@3 pkg-config librsvg

      - name: Generate macOS icon
        run: |
          mkdir -p uuuapp.iconset
          for size in 16 32 64 128 256 512; do
            rsvg-convert -w $size -h $size icons/uuuapp.svg -o uuuapp.iconset/icon_${size}x${size}.png
          done
          rsvg-convert -w 1024 -h 1024 icons/uuuapp.svg -o uuuapp.iconset/icon_512x512@2x.png
          iconutil -c icns uuuapp.iconset -o icons/uuuapp.icns

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$(brew --prefix libusb)"
          cmake --build build

      - name: Package DMG
        run: |
          # -executable= makes macdeployqt also bundle/fix-up the uuu-helper's dylibs
          macdeployqt build/uuuapp.app -executable=build/uuuapp.app/Contents/MacOS/uuu-helper
          codesign --force --deep --sign - build/uuuapp.app
          hdiutil create -volname uuu-gui -srcfolder build/uuuapp.app -ov -format UDZO uuu-gui-macos.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: uuu-gui-macos.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          arch: win64_msvc2022_64

      - name: Install dependencies
        run: vcpkg install libusb zstd tinyxml2 bzip2 zlib openssl pkgconf --triplet x64-windows

      - name: Build
        run: |
          # libuuu's CMake uses pkg_check_modules, so point pkg-config at vcpkg's .pc files
          $env:PKG_CONFIG_PATH = "C:/vcpkg/installed/x64-windows/lib/pkgconfig"
          $env:PATH = "C:/vcpkg/installed/x64-windows/tools/pkgconf;$env:PATH"
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows
          cmake --build build --config Release

      - name: Deploy
        run: |
          windeployqt build/Release/uuuapp.exe
          Compress-Archive -Path build/Release/* -DestinationPath uuu-gui-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: uuu-gui-windows.zip

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/linux-appimage/uuu-gui-linux.AppImage
            artifacts/linux-deb/uuu-gui-linux.deb
            artifacts/macos-dmg/uuu-gui-macos.dmg
            artifacts/windows-zip/uuu-gui-windows.zip
